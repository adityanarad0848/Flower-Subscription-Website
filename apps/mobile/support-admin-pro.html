<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mornify Support Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: #f7f8fa; height: 100vh; overflow: hidden; }
    
    .container { display: flex; height: 100vh; }
    
    /* Sidebar */
    .sidebar { width: 320px; background: white; border-right: 1px solid #e5e7eb; display: flex; flex-direction: column; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid #e5e7eb; }
    .sidebar-header h1 { font-size: 20px; font-weight: 600; color: #111827; margin-bottom: 4px; }
    .sidebar-header p { font-size: 13px; color: #6b7280; }
    
    .conversations-list { flex: 1; overflow-y: auto; }
    .conversation-item { padding: 16px 20px; border-bottom: 1px solid #f3f4f6; cursor: pointer; transition: background 0.15s; }
    .conversation-item:hover { background: #f9fafb; }
    .conversation-item.active { background: #eff6ff; border-left: 3px solid #3b82f6; }
    .conversation-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .conversation-name { font-size: 14px; font-weight: 600; color: #111827; }
    .conversation-time { font-size: 12px; color: #9ca3af; }
    .conversation-preview { font-size: 13px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .unread-badge { background: #ef4444; color: white; font-size: 11px; font-weight: 600; padding: 2px 6px; border-radius: 10px; margin-left: 8px; }
    
    /* Chat Area */
    .chat-container { flex: 1; display: flex; flex-direction: column; background: white; }
    
    .chat-header { padding: 16px 24px; border-bottom: 1px solid #e5e7eb; background: white; }
    .chat-header-content { display: flex; align-items: center; gap: 12px; }
    .avatar { width: 40px; height: 40px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; color: white; font-weight: 600; font-size: 16px; }
    .chat-header-info h2 { font-size: 16px; font-weight: 600; color: #111827; margin-bottom: 2px; }
    .chat-header-info p { font-size: 13px; color: #6b7280; }
    
    .messages-container { flex: 1; overflow-y: auto; padding: 24px; background: #f9fafb; }
    .message-wrapper { display: flex; margin-bottom: 12px; }
    .message-wrapper.user { justify-content: flex-start; }
    .message-wrapper.support { justify-content: flex-end; }
    .message-bubble { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px 16px; max-width: 65%; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .message-wrapper.support .message-bubble { background: #3b82f6; color: white; border-color: #3b82f6; }
    .message-text { font-size: 14px; line-height: 1.5; color: #111827; word-wrap: break-word; }
    .message-wrapper.support .message-text { color: white; }
    .message-time { font-size: 11px; color: #9ca3af; margin-top: 6px; }
    .message-wrapper.support .message-time { color: rgba(255,255,255,0.8); }
    
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #9ca3af; }
    .empty-state-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state-text { font-size: 16px; font-weight: 500; color: #6b7280; }
    
    /* Input Area */
    .input-container { padding: 16px 24px; border-top: 1px solid #e5e7eb; background: white; }
    .input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
    .input-box { flex: 1; min-height: 44px; max-height: 120px; padding: 12px 16px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 14px; font-family: inherit; resize: none; outline: none; transition: border-color 0.15s; }
    .input-box:focus { border-color: #3b82f6; }
    .input-box:disabled { background: #f9fafb; cursor: not-allowed; }
    .send-button { height: 44px; padding: 0 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .send-button:hover:not(:disabled) { background: #2563eb; }
    .send-button:disabled { background: #d1d5db; cursor: not-allowed; }
    
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    
    .status-indicator { width: 8px; height: 8px; background: #10b981; border-radius: 50%; display: inline-block; margin-right: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>💬 Conversations</h1>
        <p>Mornify Support</p>
      </div>
      <div class="conversations-list" id="conversationsList">
        <div style="padding: 40px 20px; text-align: center; color: #9ca3af;">
          <div style="font-size: 32px; margin-bottom: 12px;">📭</div>
          <div style="font-size: 14px;">No conversations yet</div>
        </div>
      </div>
    </div>
    
    <!-- Chat Area -->
    <div class="chat-container">
      <div class="chat-header" id="chatHeader" style="display: none;">
        <div class="chat-header-content">
          <div class="avatar" id="userAvatar">U</div>
          <div class="chat-header-info">
            <h2 id="userName">Select a conversation</h2>
            <p id="userPhone"></p>
          </div>
        </div>
      </div>
      
      <div class="messages-container" id="messagesContainer">
        <div class="empty-state">
          <div class="empty-state-icon">💬</div>
          <div class="empty-state-text">Select a conversation to start</div>
        </div>
      </div>
      
      <div class="input-container">
        <div class="input-wrapper">
          <textarea 
            id="messageInput" 
            class="input-box" 
            placeholder="Type your message..." 
            rows="1"
            disabled
          ></textarea>
          <button id="sendButton" class="send-button" disabled>Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dzytzztohlvjwdsfhoua.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6eXR6enRvaGx2andkc2Zob3VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwMDExNTYsImV4cCI6MjA4NjU3NzE1Nn0.x15xhhR1a3yl0zbxp3BqTpxLOInldOD76Xlt-RLRxwY';

    let currentUserId = null;
    let conversations = {};
    let lastReadMessages = localStorage.getItem('lastReadMessages') ? JSON.parse(localStorage.getItem('lastReadMessages')) : {};

    async function loadConversations() {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/support_messages?select=*&order=created_at.desc`, {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        });

        if (!response.ok) throw new Error('Failed to load');
        const data = await response.json();
        
        if (!data || data.length === 0) return;

        const oldConversations = {...conversations};
        conversations = {};
        
        data.forEach(msg => {
          if (!conversations[msg.user_id]) {
            conversations[msg.user_id] = {
              userId: msg.user_id,
              userName: 'Unknown User',
              userPhone: 'No phone',
              messages: [],
              lastMessage: msg.created_at,
              lastMessageText: msg.message,
              unreadCount: 0
            };
          }
          
          // Update user info if available in any message
          if (msg.user_name) conversations[msg.user_id].userName = msg.user_name;
          if (msg.user_phone) conversations[msg.user_id].userPhone = msg.user_phone;
          
          conversations[msg.user_id].messages.push(msg);
        });
        
        Object.keys(conversations).forEach(userId => {
          const conv = conversations[userId];
          const lastRead = lastReadMessages[userId] || 0;
          
          // Find the most recent message with user info
          const msgWithInfo = conv.messages.find(m => m.user_name || m.user_phone);
          if (msgWithInfo) {
            if (msgWithInfo.user_name) conv.userName = msgWithInfo.user_name;
            if (msgWithInfo.user_phone) conv.userPhone = msgWithInfo.user_phone;
          }
          
          conv.unreadCount = conv.messages.filter(msg => 
            msg.sender === 'user' && new Date(msg.created_at).getTime() > lastRead
          ).length;
        });

        Object.values(conversations).forEach(conv => {
          conv.messages.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
        });

        renderConversationsList();
        
        if (currentUserId && conversations[currentUserId]) {
          renderMessages(conversations[currentUserId].messages);
        }
      } catch (error) {
        console.error('Load error:', error);
      }
    }

    function renderConversationsList() {
      const list = document.getElementById('conversationsList');
      const convs = Object.values(conversations).sort((a, b) => 
        new Date(b.lastMessage) - new Date(a.lastMessage)
      );

      if (convs.length === 0) return;

      list.innerHTML = convs.map(conv => {
        const time = formatTime(new Date(conv.lastMessage));
        const unreadBadge = conv.unreadCount > 0 ? `<span class="unread-badge">${conv.unreadCount}</span>` : '';
        return `
          <div class="conversation-item ${conv.userId === currentUserId ? 'active' : ''}" data-user-id="${conv.userId}">
            <div class="conversation-header">
              <div style="display: flex; align-items: center;">
                <span class="conversation-name">${conv.userName}</span>
                ${unreadBadge}
              </div>
              <span class="conversation-time">${time}</span>
            </div>
            <div class="conversation-preview">${conv.userPhone}</div>
          </div>
        `;
      }).join('');

      document.querySelectorAll('.conversation-item').forEach(item => {
        item.addEventListener('click', () => selectConversation(item.dataset.userId));
      });
    }

    function selectConversation(userId) {
      currentUserId = userId;
      const conv = conversations[userId];
      
      lastReadMessages[userId] = Date.now();
      localStorage.setItem('lastReadMessages', JSON.stringify(lastReadMessages));
      conv.unreadCount = 0;
      
      document.querySelectorAll('.conversation-item').forEach(el => el.classList.remove('active'));
      document.querySelector(`[data-user-id="${userId}"]`)?.classList.add('active');

      const initial = conv.userName.charAt(0).toUpperCase();
      document.getElementById('chatHeader').style.display = 'block';
      document.getElementById('userAvatar').textContent = initial;
      document.getElementById('userName').textContent = conv.userName;
      document.getElementById('userPhone').textContent = conv.userPhone;

      renderMessages(conv.messages);
      renderConversationsList();

      document.getElementById('messageInput').disabled = false;
      document.getElementById('sendButton').disabled = false;
    }

    function renderMessages(messages) {
      const container = document.getElementById('messagesContainer');
      
      container.innerHTML = messages.map(msg => {
        const time = formatMessageTime(new Date(msg.created_at));
        const isSupport = msg.sender === 'support';
        
        return `
          <div class="message-wrapper ${msg.sender}">
            <div class="message-bubble">
              <div class="message-text">${msg.message}</div>
              <div class="message-time">${time}</div>
            </div>
          </div>
        `;
      }).join('');

      container.scrollTop = container.scrollHeight;
    }

    function formatTime(date) {
      const now = new Date();
      const diff = now - date;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);

      if (minutes < 1) return 'Just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      if (days < 7) return `${days}d ago`;
      return date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });
    }

    function formatMessageTime(date) {
      const utcDate = new Date(date);
      const istDate = new Date(utcDate.getTime() + (5.5 * 60 * 60 * 1000));
      const day = istDate.getDate();
      const month = istDate.toLocaleString('en-IN', { month: 'short' });
      const time = istDate.toLocaleTimeString('en-IN', { 
        hour: '2-digit', 
        minute: '2-digit',
        hour12: true
      });
      return `${day} ${month} ${time}`;
    }

    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message || !currentUserId) return;

      const sendBtn = document.getElementById('sendButton');
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending...';

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/support_messages`, {
          method: 'POST',
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=representation'
          },
          body: JSON.stringify({
            user_id: currentUserId,
            message: message,
            sender: 'support'
          })
        });

        if (!response.ok) throw new Error('Failed to send');

        const data = await response.json();
        const newMsg = data[0];
        conversations[currentUserId].messages.push(newMsg);
        conversations[currentUserId].lastMessage = newMsg.created_at;
        conversations[currentUserId].lastMessageText = newMsg.message;
        
        renderMessages(conversations[currentUserId].messages);
        renderConversationsList();
        input.value = '';
        input.style.height = 'auto';
      } catch (error) {
        alert('Error sending message');
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
      }
    }

    // Auto-resize textarea
    document.getElementById('messageInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    document.getElementById('sendButton').addEventListener('click', sendMessage);
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    loadConversations();
    setInterval(loadConversations, 5000);
  </script>
</body>
</html>
