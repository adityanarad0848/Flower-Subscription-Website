<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="60" cy="60" r="58" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  
  <!-- Sun Rays (Morning) -->
  <g opacity="0.6">
    <line x1="60" y1="15" x2="60" y2="25" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>
    <line x1="85" y1="20" x2="80" y2="28" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>
    <line x1="100" y1="35" x2="92" y2="40" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>
    <line x1="35" y1="20" x2="40" y2="28" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="35" x2="28" y2="40" stroke="#F97316" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Flower Petals -->
  <g transform="translate(60, 60)">
    <!-- Center Circle -->
    <circle cx="0" cy="0" r="12" fill="#FDBA74"/>
    
    <!-- Petals (5 petals forming a flower) -->
    <ellipse cx="0" cy="-20" rx="8" ry="14" fill="#FB923C" transform="rotate(0)"/>
    <ellipse cx="0" cy="-20" rx="8" ry="14" fill="#FB923C" transform="rotate(72)"/>
    <ellipse cx="0" cy="-20" rx="8" ry="14" fill="#FB923C" transform="rotate(144)"/>
    <ellipse cx="0" cy="-20" rx="8" ry="14" fill="#FB923C" transform="rotate(216)"/>
    <ellipse cx="0" cy="-20" rx="8" ry="14" fill="#FB923C" transform="rotate(288)"/>
    
    <!-- Inner details -->
    <circle cx="0" cy="0" r="8" fill="#EA580C"/>
    <circle cx="0" cy="0" r="4" fill="#FDBA74"/>
  </g>
  
  <!-- Leaf accent -->
  <path d="M 35 75 Q 30 70 35 65 Q 40 70 35 75" fill="#22C55E" opacity="0.8"/>
  <path d="M 85 75 Q 90 70 85 65 Q 80 70 85 75" fill="#22C55E" opacity="0.8"/>
  
  <!-- Letter M integrated -->
  <text x="60" y="100" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#EA580C" text-anchor="middle">M</text>
</svg>
