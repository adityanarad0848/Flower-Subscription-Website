<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="petalGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FB923C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EA580C;stop-opacity:1" />
    </linearGradient>
    
    <radialGradient id="centerGrad" cx="50%" cy="50%">
      <stop offset="0%" style="stop-color:#FEF3C7;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#FDE047;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FACC15;stop-opacity:1" />
    </radialGradient>
    
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Glow background -->
  <circle cx="24" cy="24" r="22" fill="#FEF3C7" opacity="0.3"/>
  
  <!-- Sun ray accent -->
  <line x1="24" y1="4" x2="24" y2="10" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="36" y1="8" x2="32" y2="13" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="12" y1="8" x2="16" y2="13" stroke="#F59E0B" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Flower -->
  <g transform="translate(24, 24)" filter="url(#glow)">
    <!-- Outer petals -->
    <ellipse cx="0" cy="-10" rx="5" ry="9" fill="url(#petalGrad)" transform="rotate(0)"/>
    <ellipse cx="0" cy="-10" rx="5" ry="9" fill="url(#petalGrad)" transform="rotate(72)"/>
    <ellipse cx="0" cy="-10" rx="5" ry="9" fill="url(#petalGrad)" transform="rotate(144)"/>
    <ellipse cx="0" cy="-10" rx="5" ry="9" fill="url(#petalGrad)" transform="rotate(216)"/>
    <ellipse cx="0" cy="-10" rx="5" ry="9" fill="url(#petalGrad)" transform="rotate(288)"/>
    
    <!-- Inner petals -->
    <ellipse cx="0" cy="-7" rx="3.5" ry="6" fill="#FDBA74" opacity="0.9" transform="rotate(36)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="6" fill="#FDBA74" opacity="0.9" transform="rotate(108)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="6" fill="#FDBA74" opacity="0.9" transform="rotate(180)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="6" fill="#FDBA74" opacity="0.9" transform="rotate(252)"/>
    <ellipse cx="0" cy="-7" rx="3.5" ry="6" fill="#FDBA74" opacity="0.9" transform="rotate(324)"/>
    
    <!-- Center -->
    <circle cx="0" cy="0" r="6" fill="url(#centerGrad)"/>
    <circle cx="0" cy="0" r="4" fill="#FDE047"/>
    <circle cx="0" cy="0" r="2" fill="#FACC15"/>
  </g>
  
  <!-- Leaves -->
  <path d="M 14 32 Q 10 29 13 26 Q 16 29 14 32" fill="#10B981" opacity="0.9"/>
  <path d="M 34 32 Q 38 29 35 26 Q 32 29 34 32" fill="#10B981" opacity="0.9"/>
</svg>
