<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Flower Petals -->
  <g transform="translate(20, 20)">
    <!-- Petals -->
    <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#FB923C" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#FB923C" transform="rotate(72)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#FB923C" transform="rotate(144)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#FB923C" transform="rotate(216)"/>
    <ellipse cx="0" cy="-8" rx="4" ry="7" fill="#FB923C" transform="rotate(288)"/>
    
    <!-- Center -->
    <circle cx="0" cy="0" r="5" fill="#EA580C"/>
    <circle cx="0" cy="0" r="2" fill="#FDBA74"/>
  </g>
  
  <!-- Sun ray accent -->
  <line x1="20" y1="2" x2="20" y2="6" stroke="#F97316" stroke-width="2" stroke-linecap="round"/>
