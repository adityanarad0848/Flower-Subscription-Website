<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#E91E63">
    <title>Flower Subscription</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #FFF5F8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .emoji { font-size: 64px; margin-bottom: 16px; }
        h1 { font-size: 28px; color: #333; margin-bottom: 8px; }
        p { font-size: 16px; color: #666; margin-bottom: 32px; }
        button {
            width: 100%;
            padding: 16px;
            margin-bottom: 12px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: #E91E63;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:active { background: #C2185B; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🌸</div>
        <h1>Flower Subscription</h1>
        <p>Fresh flowers delivered to your door</p>
        <button onclick="subscribe('Weekly', '$15')">Weekly - $15</button>
        <button onclick="subscribe('Monthly', '$50')">Monthly - $50</button>
        <button onclick="subscribe('Yearly', '$500')">Yearly - $500</button>
    </div>
    <div class="toast" id="toast"></div>
    
    <script>
        function subscribe(plan, price) {
            const toast = document.getElementById('toast');
            toast.textContent = `Selected: ${plan} Plan - ${price}`;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }
        
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
